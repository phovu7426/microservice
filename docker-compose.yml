services:
  # ══ Kafka Stack ═══════════════════════════════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    container_name: comic-kafka
    restart: unless-stopped
    ports:
      - "127.0.0.1:9092:9092"
      - "127.0.0.1:9093:9093"
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      # KRaft combined mode (broker + controller in single node)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Topic defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: comic-kafka-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: comic-platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      AUTH_TYPE: LOGIN_FORM
      SPRING_SECURITY_USER_NAME: ${KAFKA_UI_USER:-admin}
      SPRING_SECURITY_USER_PASSWORD: ${KAFKA_UI_PASSWORD:-admin_changeme}
    deploy:
      resources:
        limits:
          memory: 128M

  rabbitmq:
    image: rabbitmq:3-management
    container_name: comic-rabbitmq
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ══ PostgreSQL — 1 DB per service ═════════════════════════════════════════════
  auth-db:
    image: postgres:15-alpine
    container_name: comic-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  comic-db:
    image: postgres:15-alpine
    container_name: comic-comic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: comic_db
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - comic_db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d comic_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:15-alpine
    container_name: comic-notification-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_db
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  config-db:
    image: postgres:15-alpine
    container_name: comic-config-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: config_db
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - config_db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d config_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  post-db:
    image: postgres:15-alpine
    container_name: comic-post-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: post_db
    ports:
      - "127.0.0.1:5438:5432"
    volumes:
      - post_db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d post_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  cms-db:
    image: postgres:15-alpine
    container_name: comic-cms-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cms_db
    ports:
      - "127.0.0.1:5440:5432"
    volumes:
      - cms_db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  iam-db:
    image: postgres:15-alpine
    container_name: comic-iam-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iam_db
    ports:
      - "127.0.0.1:5441:5432"
    volumes:
      - iam_db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iam_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ══ Redis — 1 instance per service ════════════════════════════════════════════
  auth-redis:
    image: redis:7-alpine
    container_name: comic-auth-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - auth_redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret_changeme} --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128M

  comic-redis:
    image: redis:7-alpine
    container_name: comic-comic-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - comic_redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret_changeme} --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128M

  notification-redis:
    image: redis:7-alpine
    container_name: comic-notification-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6382:6379"
    volumes:
      - notification_redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret_changeme} --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128M

  post-redis:
    image: redis:7-alpine
    container_name: comic-post-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6384:6379"
    volumes:
      - post_redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret_changeme} --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128M

  web-api-redis:
    image: redis:7-alpine
    container_name: comic-web-api-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6383:6379"
    volumes:
      - web_api_redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret_changeme} --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128M

  iam-redis:
    image: redis:7-alpine
    container_name: comic-iam-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6385:6379"
    volumes:
      - iam_redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret_changeme} --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128M

  # ══ PgBouncer (opt-in — `--profile pgbouncer`) ═══════════════════════════════
  # Transaction-mode pool in front of all per-service DBs.
  # Enable when scaling beyond 1 replica per service or seeing connection
  # exhaustion alerts. See infrastructure/pgbouncer/ for setup.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: comic-pgbouncer
    profiles: ["pgbouncer"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:6432:6432"
    deploy:
      resources:
        limits:
          memory: 64M
    volumes:
      - ./infrastructure/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infrastructure/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      - auth-db
      - comic-db
      - notification-db
      - config-db
      - post-db
      - cms-db
      - iam-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ══ Observability ═════════════════════════════════════════════════════════════
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: comic-jaeger
    restart: unless-stopped
    ports:
      - "127.0.0.1:16686:16686"   # Jaeger UI
      - "127.0.0.1:4318:4318"     # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    deploy:
      resources:
        limits:
          memory: 256M

  # ══ API Gateway (Nginx) — full Docker mode ═══════════════════════════════════
  nginx:
    image: nginx:1.25-alpine
    container_name: comic-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - storage-service
      - web-api-service
      - auth-service
      - config-service
      - comic-service
      - notification-service
      - post-service
      - introduction-service
      - marketing-service
      - iam-service
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/nginx/snippets:/etc/nginx/snippets:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ══ API Gateway (Nginx) — DEV mode ═══════════════════════════════════════════
  # Service chạy host (npm start), nginx route ngược qua host.docker.internal.
  # Chỉ start khi gọi: docker compose --profile dev up -d nginx-dev
  nginx-dev:
    image: nginx:1.25-alpine
    container_name: comic-nginx-dev
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          memory: 64M
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infrastructure/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/nginx/snippets:/etc/nginx/snippets:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ══ Storage Service (:3004) ═══════════════════════════════════════════════════
  storage-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: storage-service
        SERVICE_PORT: "3004"
    container_name: comic-storage-service
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3004
      GLOBAL_PREFIX: api/storage
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_MAX_FILE_SIZE: ${STORAGE_MAX_FILE_SIZE:-10485760}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-}
      STORAGE_S3_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-}
      STORAGE_S3_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}
      STORAGE_S3_FORCE_PATH_STYLE: ${STORAGE_S3_FORCE_PATH_STYLE:-true}
      STORAGE_S3_BASE_URL: ${STORAGE_S3_BASE_URL:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-}
      UPLOAD_DEST: ${UPLOAD_DEST:-./storage/uploads}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3004:3004"
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - storage_uploads:/app/storage/uploads

  # ══ Auth Service (:3001) ══════════════════════════════════════════════════════
  auth-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: auth-service
        SERVICE_PORT: "3001"
    container_name: comic-auth-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      auth-db:
        condition: service_healthy
      auth-redis:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      GLOBAL_PREFIX: api/auth
      DATABASE_URL: postgresql://postgres:postgres@auth-db:5432/auth_db?connection_limit=20&pool_timeout=60
      REDIS_URL: redis://auth-redis:6379
      JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM:-}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM:-}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      JWT_ISSUER: ${JWT_ISSUER:-auth-service}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-comic-platform}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      GOOGLE_FRONTEND_URL: ${GOOGLE_FRONTEND_URL:-}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      EVENT_DRIVER: ${EVENT_DRIVER:-local}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set (>=32 chars)}
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3001:3001"
    deploy:
      resources:
        limits:
          memory: 256M

  # ══ Config Service (:3003) ════════════════════════════════════════════════════
  config-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: config-service
        SERVICE_PORT: "3003"
    container_name: comic-config-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      config-db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      GLOBAL_PREFIX: api/config
      DATABASE_URL: postgresql://postgres:postgres@config-db:5432/config_db?connection_limit=20&pool_timeout=60
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set (>=32 chars)}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3003:3003"
    deploy:
      resources:
        limits:
          memory: 256M

  # ══ Web API Service (:3010) — aggregator for FE (homepage, search) ═══════════
  web-api-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: web-api-service
        SERVICE_PORT: "3010"
    container_name: comic-web-api-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      web-api-redis:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3010
      GLOBAL_PREFIX: api/web
      COMIC_SERVICE_URL: ${COMIC_SERVICE_URL:-http://comic-service:3009/api/comics}
      POST_SERVICE_URL: ${POST_SERVICE_URL:-http://post-service:3008/api/posts}
      REDIS_URL: redis://web-api-redis:6379
      SERVICE_TIMEOUT_MS: ${SERVICE_TIMEOUT_MS:-5000}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3010:3010"
    deploy:
      resources:
        limits:
          memory: 256M

  # ══ Comic Service (:3009) ═════════════════════════════════════════════════════
  comic-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: comic-service
        SERVICE_PORT: "3009"
    container_name: comic-comic-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      comic-db:
        condition: service_healthy
      comic-redis:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3009
      GLOBAL_PREFIX: api/comics
      DATABASE_URL: postgresql://postgres:postgres@comic-db:5432/comic_db?connection_limit=20&pool_timeout=60
      REDIS_URL: redis://comic-redis:6379
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
      KAFKA_BROKERS: kafka:9092
      EVENT_DRIVER: ${EVENT_DRIVER:-local}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3009:3009"
    deploy:
      resources:
        limits:
          memory: 256M

  # ══ Notification Service (:3005) ═══════════════════════════════════════════
  notification-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: notification-service
        SERVICE_PORT: "3005"
    container_name: comic-notification-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      notification-db:
        condition: service_healthy
      notification-redis:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3005
      GLOBAL_PREFIX: api/notifications
      DATABASE_URL: postgresql://postgres:postgres@notification-db:5432/notification_db?connection_limit=20&pool_timeout=60
      REDIS_URL: redis://notification-redis:6379
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: notification-service
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3005:3005"
    deploy:
      resources:
        limits:
          memory: 256M

  # ══ Post Service (:3008) ═════════════════════════════════════════════════
  post-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: post-service
        SERVICE_PORT: "3008"
    container_name: comic-post-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      post-db:
        condition: service_healthy
      post-redis:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3008
      GLOBAL_PREFIX: api/posts
      DATABASE_URL: postgresql://postgres:postgres@post-db:5432/post_db?connection_limit=20&pool_timeout=60
      REDIS_URL: redis://post-redis:6379
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
      KAFKA_BROKERS: kafka:9092
      EVENT_DRIVER: ${EVENT_DRIVER:-local}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3008:3008"
    deploy:
      resources:
        limits:
          memory: 256M

  # ══ CMS Service (:3006) ═══════════════════════════════════════════════════
  cms-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: cms-service
        SERVICE_PORT: "3006"
    container_name: comic-cms-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      cms-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3006
      GLOBAL_PREFIX: api/cms
      DATABASE_URL: postgresql://postgres:postgres@cms-db:5432/cms_db?connection_limit=20&pool_timeout=60
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
      KAFKA_BROKERS: kafka:9092
      EVENT_DRIVER: ${EVENT_DRIVER:-local}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3006:3006"
    deploy:
      resources:
        limits:
          memory: 256M

  # ══ IAM Service (:3002) ════════════════════════════════════════════════════
  iam-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: iam-service
        SERVICE_PORT: "3002"
    container_name: comic-iam-service
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      iam-db:
        condition: service_healthy
      iam-redis:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3002
      GLOBAL_PREFIX: api/iam
      DATABASE_URL: postgresql://postgres:postgres@iam-db:5432/iam_db?connection_limit=20&pool_timeout=60
      REDIS_URL: redis://iam-redis:6379
      AUTH_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
      RBAC_CACHE_TTL: ${RBAC_CACHE_TTL:-86400}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set (>=32 chars)}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3002:3002"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  # Storage
  storage_uploads:
  # Kafka
  kafka_data:
  # RabbitMQ
  rabbitmq_data:
  # PostgreSQL
  auth_db_data:
  comic_db_data:
  notification_db_data:
  config_db_data:
  post_db_data:
  cms_db_data:
  iam_db_data:
  # Redis
  auth_redis_data:
  comic_redis_data:
  notification_redis_data:
  post_redis_data:
  web_api_redis_data:
  iam_redis_data:
