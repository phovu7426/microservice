# nginx gateway for Railway — routes public traffic to each microservice
# via their *.up.railway.app domains over HTTPS.
#
# Mounted at /etc/nginx/conf.d/default.conf (inside the parent http{} block).
# Snippets mounted at /etc/nginx/snippets/.
#
# ── Routing table ─────────────────────────────────────────────────────────────
#   /.well-known/jwks.json      → mon-auth-service
#   /api/auth/                  → mon-auth-service
#   /api/comics/                → mon-comic-service
#   /api/config/                → mon-config-service
#   /api/iam/                   → mon-iam-service
#   /api/notifications/         → mon-notification-service
#   /api/posts/                 → mon-post-service
#   /api/cms/                   → mon-cms-service
#   /api/storage/ /storage/     → mon-storage-service
#   /api/web/                   → mon-web-api-service

# ── DNS resolver ──────────────────────────────────────────────────────────────
resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;

# ── Upstreams: Railway public domains ─────────────────────────────────────────
upstream auth_service          { server mon-auth-service.up.railway.app:443;          keepalive 16; }
upstream comic_service         { server mon-comic-service.up.railway.app:443;         keepalive 32; }
upstream config_service        { server mon-config-service.up.railway.app:443;        keepalive 16; }
upstream iam_service           { server mon-iam-service.up.railway.app:443;           keepalive 16; }
upstream notification_service  { server mon-notification-service.up.railway.app:443;  keepalive 16; }
upstream post_service          { server mon-post-service.up.railway.app:443;          keepalive 16; }
upstream cms_service           { server mon-cms-service.up.railway.app:443;           keepalive 16; }
upstream storage_service       { server mon-storage-service.up.railway.app:443;       keepalive 16; }
upstream web_api_service       { server mon-web-api-service.up.railway.app:443;       keepalive 16; }

# ── Map request URI → upstream Host header ────────────────────────────────────
# proxy_pass to a named upstream sends the group name as Host by default,
# which breaks Railway's SNI routing. This map provides the correct hostname
# so the server-level proxy_set_header Host $upstream_host works for all
# location blocks without repeating it per location.
map $uri $upstream_host {
    ~^/api/auth/            mon-auth-service.up.railway.app;
    ~^/api/comics/          mon-comic-service.up.railway.app;
    ~^/api/config/          mon-config-service.up.railway.app;
    ~^/api/iam/             mon-iam-service.up.railway.app;
    ~^/api/notifications/   mon-notification-service.up.railway.app;
    ~^/api/posts/           mon-post-service.up.railway.app;
    ~^/api/cms/             mon-cms-service.up.railway.app;
    ~^/api/storage/         mon-storage-service.up.railway.app;
    ~^/api/web/             mon-web-api-service.up.railway.app;
    ~^/.well-known/         mon-auth-service.up.railway.app;
    ~^/storage/             mon-storage-service.up.railway.app;
    default                 $host;
}

# ── Sanitize incoming X-Correlation-Id ───────────────────────────────────────
map $http_x_correlation_id $sanitized_correlation_id {
    default                          $request_id;
    "~^[A-Za-z0-9._-]{1,128}$"      $http_x_correlation_id;
}

# ── Rate limit zones ──────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=60r/s;

# ── Trust Railway's edge proxy for real client IP ─────────────────────────────
# Railway terminates TLS and forwards X-Forwarded-For before reaching this
# container, so we trust all IPs here. Tighten to Railway's CIDR if published.
real_ip_header    X-Forwarded-For;
real_ip_recursive on;
set_real_ip_from  0.0.0.0/0;

# ── Gzip ──────────────────────────────────────────────────────────────────────
gzip            on;
gzip_vary       on;
gzip_proxied    any;
gzip_comp_level 4;
gzip_min_length 256;
gzip_types      application/json application/javascript text/plain text/css text/xml application/xml;

# ═════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name _;
    server_tokens off;
    client_max_body_size 1m;

    include /etc/nginx/snippets/security_headers.conf;
    limit_req_status 429;

    # ── Common HTTPS proxy settings ───────────────────────────────────────────
    # All location blocks below inherit these unless they define their own
    # proxy_set_header directives (nginx inheritance rule).
    proxy_http_version    1.1;
    proxy_ssl_server_name on;
    proxy_ssl_verify      off;  # Railway uses valid LE certs; off avoids
                                 # bundling the CA bundle in this container.
    proxy_set_header Connection         "";
    proxy_set_header Host               $upstream_host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-Host   $host;
    proxy_set_header X-Request-Id       $request_id;
    proxy_set_header X-User-Id          "";
    proxy_set_header X-Correlation-Id   $sanitized_correlation_id;
    proxy_connect_timeout 10s;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # ── JWKS (public, standard path) → Auth Service ───────────────────────────
    location = /.well-known/jwks.json {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass https://auth_service;
        proxy_read_timeout 10s;
        add_header Cache-Control "public, max-age=300" always;
    }

    # ── Auth Service: /api/auth/ ──────────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass https://auth_service;
    }

    # ── Comic Service: /api/comics/ ───────────────────────────────────────────
    location /api/comics/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass https://comic_service;
    }

    # ── Config Service: /api/config/ ──────────────────────────────────────────
    location /api/config/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass https://config_service;
    }

    # ── IAM Service: /api/iam/ ────────────────────────────────────────────────
    location /api/iam/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass https://iam_service;
    }

    # ── Notification Service: /api/notifications/ ─────────────────────────────
    location /api/notifications/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass https://notification_service;
    }

    # ── Post Service: /api/posts/ ─────────────────────────────────────────────
    location /api/posts/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass https://post_service;
    }

    # ── CMS Service: /api/cms/ ────────────────────────────────────────────────
    location /api/cms/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass https://cms_service;
    }

    # ── Storage Service: /api/storage/ ────────────────────────────────────────
    location /api/storage/ {
        client_max_body_size 11m;
        limit_req zone=upload_limit burst=5 nodelay;
        proxy_pass https://storage_service;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Web API Service: /api/web/ ────────────────────────────────────────────
    location /api/web/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass https://web_api_service;
        proxy_read_timeout 10s;
    }

    # ── Static files → Storage Service ───────────────────────────────────────
    location /storage/ {
        proxy_pass https://storage_service;
        expires 1d;
        add_header Cache-Control "public, immutable" always;
    }

    # ── Fallback for unknown /api/ routes ─────────────────────────────────────
    location /api/ {
        return 404 '{"statusCode":404,"message":"Route not found"}';
        add_header Content-Type application/json always;
    }

    # ── Gateway health probe ──────────────────────────────────────────────────
    location ~ ^/health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
