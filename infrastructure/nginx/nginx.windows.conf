# Nginx config cho Windows native (không dùng Docker).
# Services chạy trực tiếp trên host qua `npm run dev`.
#
# CÁCH SỬ DỤNG:
#   1. Copy file này vào C:/nginx/conf/nginx.conf (ghi đè file cũ)
#   2. Copy thư mục infrastructure/nginx/snippets/ vào C:/nginx/conf/snippets/
#   3. Tạo thư mục logs: C:/nginx/logs/ (nếu chưa có)
#   4. Kiểm tra config: C:/nginx/nginx.exe -t
#   5. Khởi động:       C:/nginx/nginx.exe
#   6. Reload config:   C:/nginx/nginx.exe -s reload
#   7. Dừng:            C:/nginx/nginx.exe -s stop

worker_processes 1;

error_log  logs/error.log warn;
pid        logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Upstreams — services chạy trực tiếp trên localhost ───────────────────
    upstream auth_service          { server 127.0.0.1:3001; keepalive 16; }
    upstream comic_service         { server 127.0.0.1:3009; keepalive 32; }
    upstream config_service        { server 127.0.0.1:3003; keepalive 16; }
    upstream iam_service           { server 127.0.0.1:3002; keepalive 16; }
    upstream notification_service  { server 127.0.0.1:3005; keepalive 16; }
    upstream post_service          { server 127.0.0.1:3008; keepalive 16; }
    upstream introduction_service  { server 127.0.0.1:3007; keepalive 16; }
    upstream marketing_service     { server 127.0.0.1:3006; keepalive 16; }
    upstream storage_service       { server 127.0.0.1:3004; keepalive 16; }
    upstream web_api_service       { server 127.0.0.1:3010; keepalive 16; }
    upstream cms_service           { server 127.0.0.1:3011; keepalive 16; }

    # ── Rate limit zones ─────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=60r/s;

    map $http_x_correlation_id $sanitized_correlation_id {
        default          $request_id;
        "~^[A-Za-z0-9._-]{1,128}$" $http_x_correlation_id;
    }

    # Dev: trust X-Forwarded-* từ bất cứ đâu (local box)
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 0.0.0.0/0;

    server {
        listen 80;
        server_name localhost;
        server_tokens off;
        client_max_body_size 1m;

        include C:/nginx/conf/snippets/security_headers.conf;

        # ── JWKS → Auth Service ──────────────────────────────────────────────
        location = /.well-known/jwks.json {
            proxy_pass http://auth_service;
            include C:/nginx/conf/snippets/proxy_common.conf;
        }

        # ── Auth Service: /api/auth/ ─────────────────────────────────────────
        location /api/auth/ {
            proxy_pass http://auth_service;
            include C:/nginx/conf/snippets/proxy_common.conf;
        }

        # ── Comic Service: /api/comics/ ──────────────────────────────────────
        location /api/comics/ {
            proxy_pass http://comic_service;
            include C:/nginx/conf/snippets/proxy_common.conf;
        }

        # ── Config Service: /api/config/ ─────────────────────────────────────
        location /api/config/ {
            proxy_pass http://config_service;
            include C:/nginx/conf/snippets/proxy_common.conf;
        }

        # ── IAM Service: /api/iam/ ───────────────────────────────────────────
        location /api/iam/ {
            proxy_pass http://iam_service;
            include C:/nginx/conf/snippets/proxy_common.conf;
        }

        # ── Notification Service: /api/notifications/ ────────────────────────
        location /api/notifications/ {
            proxy_pass http://notification_service;
            include C:/nginx/conf/snippets/proxy_common.conf;
        }

        # ── Post Service: /api/posts/ ────────────────────────────────────────
        location /api/posts/ {
            proxy_pass http://post_service;
            include C:/nginx/conf/snippets/proxy_common.conf;
        }

        # ── Introduction Service: /api/introduction/ ─────────────────────────
        location /api/introduction/ {
            proxy_pass http://introduction_service;
            include C:/nginx/conf/snippets/proxy_common.conf;
        }

        # ── Marketing Service: /api/marketing/ ───────────────────────────────
        location /api/marketing/ {
            proxy_pass http://marketing_service;
            include C:/nginx/conf/snippets/proxy_common.conf;
        }

        # ── Storage Service: /api/storage/ ───────────────────────────────────
        location /api/storage/ {
            client_max_body_size 11m;
            limit_req zone=upload_limit burst=5 nodelay;
            proxy_pass http://storage_service;
            include C:/nginx/conf/snippets/proxy_common.conf;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── User endpoints: /api/user/ → IAM Service ─────────────────────────
        location /api/user/ {
            rewrite ^/api/user/(.*)$ /api/iam/user/$1 break;
            proxy_pass http://iam_service;
            include C:/nginx/conf/snippets/proxy_common.conf;
        }

        # ── CMS Service: /api/cms/ ──────────────────────────────────────────
        location /api/cms/ {
            proxy_pass http://cms_service;
            include C:/nginx/conf/snippets/proxy_common.conf;
        }

        # ── Web API Service: /api/web/ ───────────────────────────────────────
        location /api/web/ {
            proxy_pass http://web_api_service;
            include C:/nginx/conf/snippets/proxy_common.conf;
        }

        # ── Static files → Storage Service ───────────────────────────────────
        location /storage/ {
            proxy_pass http://storage_service;
            include C:/nginx/conf/snippets/proxy_common.conf;
        }

        # ── Fallback 404 cho /api/ không khớp ────────────────────────────────
        location /api/ {
            return 404 '{"statusCode":404,"message":"Route not found"}';
            add_header Content-Type application/json always;
        }

        # ── Health check ─────────────────────────────────────────────────────
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
