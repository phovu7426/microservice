# docker-compose.dev.yml — Chỉ dùng khi chạy services thủ công trên host (npm run start:dev)
#
# DB và Redis bạn đã có sẵn local → không cần ở đây.
# File này cung cấp:
#   - Kafka (broker + KRaft, không cần Zookeeper)
#   - Kafka UI   → http://localhost:8080
#   - Nginx      → http://localhost  (API Gateway route vào từng service)
#   - Jaeger     → http://localhost:16686  (optional, xem traces)
#
# Cách dùng:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down

services:
  # ── Kafka (KRaft mode, không cần Zookeeper) ────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    container_name: comic-kafka
    restart: unless-stopped
    ports:
      - "127.0.0.1:9092:9092"   # internal (container-to-container)
      - "127.0.0.1:9093:9093"   # external → services trên host dùng localhost:9093
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: comic-kafka-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: comic-platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      AUTH_TYPE: LOGIN_FORM
      SPRING_SECURITY_USER_NAME: ${KAFKA_UI_USER:-admin}
      SPRING_SECURITY_USER_PASSWORD: ${KAFKA_UI_PASSWORD:-admin}
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Nginx — API Gateway (dev mode) ────────────────────────────────────────
  # Route localhost/api/... → service đang chạy trên host qua host.docker.internal
  nginx:
    image: nginx:1.25-alpine
    container_name: comic-nginx-dev
    restart: unless-stopped
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infrastructure/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/nginx/snippets:/etc/nginx/snippets:ro
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Jaeger — distributed tracing (optional) ────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: comic-jaeger
    restart: unless-stopped
    ports:
      - "127.0.0.1:16686:16686"  # Jaeger UI
      - "127.0.0.1:4318:4318"    # OTLP HTTP endpoint
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  kafka_data:
